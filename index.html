<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataViz - 数据可视化图表生成器</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
body{background:#101010;color:#f5f5f5;min-height:100vh}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1a1a1a}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}

.nav{position:fixed;top:0;left:0;right:0;z-index:50;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;transition:background .3s,backdrop-filter .3s}
.nav.scrolled{background:rgba(16,16,16,.85);backdrop-filter:blur(12px)}
.nav-inner{max-width:1440px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-brand .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#0070a0,#1b9cca);display:flex;align-items:center;justify-content:center}
.nav-brand .logo svg{width:18px;height:18px;color:#fff}
.nav-brand span{font-size:16px;font-weight:600;letter-spacing:.5px;color:#f5f5f5}
.nav-actions{display:flex;align-items:center;gap:12px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border:none;font-family:inherit;line-height:1.5}
.btn-primary{background:linear-gradient(135deg,#0070a0,#1b9cca);color:#fff;position:relative;overflow:hidden}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#a0a0a0}
.btn-ghost:hover{color:#f5f5f5;background:rgba(255,255,255,.05)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px}
.btn-icon{width:28px;height:28px;padding:0;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transform:skewX(-20deg);transition:left .5s ease}
.btn-primary:hover::after{left:150%}

.hero{position:relative;padding-top:56px;min-height:260px}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(0,112,160,.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 30%,rgba(27,156,202,.08) 0%,transparent 50%)}
.hero-inner{position:relative;max-width:1440px;margin:0 auto;padding:48px 24px 32px}
.hero h1{font-size:42px;font-weight:700;line-height:1.15;letter-spacing:-.02em;margin-bottom:12px}
.hero h1 .gradient{background:linear-gradient(135deg,#0070a0,#1b9cca);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:15px;color:#a0a0a0;line-height:1.7;max-width:480px}

.stats-bar{border-top:1px solid #222;border-bottom:1px solid #222;background:#141414}
.stats-inner{max-width:1440px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:40px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:3px}
.stat-label{font-size:12px;color:#666}
.stat-value{font-size:20px;font-weight:600;color:#f5f5f5;font-family:'Roboto Mono','Noto Sans SC',monospace}

.main{max-width:1440px;margin:0 auto;padding:28px 24px}
.main-grid{display:flex;gap:20px}

.panel{border-radius:10px;background:#161616;border:1px solid #222;overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #222}
.panel-header h2{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#f5f5f5}
.panel-header h2 svg{width:16px;height:16px;color:#0070a0}

.data-panel{width:480px;flex-shrink:0}
.col-headers{display:grid;grid-template-columns:100px 1fr 100px 36px 36px;gap:4px;padding:8px 16px;background:#1a1a1a;font-size:12px;color:#666;font-weight:500}
.data-rows{max-height:460px;overflow-y:auto}
.data-row{display:grid;grid-template-columns:100px 1fr 100px 36px 36px;gap:4px;padding:6px 16px;align-items:center;border-bottom:1px solid #1a1a1a;transition:background .15s}
.data-row:hover{background:rgba(0,112,160,.06)}
.data-row input{width:100%;height:32px;padding:0 10px;border-radius:5px;border:1px solid #2a2a2a;background:#1a1a1a;color:#f5f5f5;font-size:13px;font-family:inherit;transition:border-color .2s}
.data-row input:focus{border-color:#0070a0;outline:none}
.data-row input[type="number"]{font-family:'Roboto Mono','Noto Sans SC',monospace}
.row-arrows{display:flex;flex-direction:column;align-items:center}
.row-arrows button{background:none;border:none;color:#666;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;height:14px;transition:color .2s}
.row-arrows button:hover{color:#a0a0a0}
.row-arrows button:disabled{opacity:.2;cursor:not-allowed}
.row-del{background:none;border:none;color:#666;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:5px;transition:all .2s}
.row-del:hover{color:#e57373;background:rgba(229,115,115,.1)}
.panel-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid #222}
.panel-footer .count{font-size:12px;color:#555}

.chart-panel{flex:1;min-width:0;box-shadow:0 0 20px rgba(0,112,160,.08)}
.chart-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #222;flex-wrap:wrap;gap:10px}
.chart-header-left{display:flex;align-items:center;gap:8px}
.chart-header-left svg{width:16px;height:16px;color:#0070a0}
.chart-header-left input{background:transparent;border:none;color:#f5f5f5;font-size:14px;font-weight:500;font-family:inherit;width:240px;padding:4px 8px;border-radius:4px;transition:background .2s}
.chart-header-left input:focus{outline:none;background:rgba(255,255,255,.04)}
.chart-header-right{display:flex;align-items:center;gap:8px}
.chart-area{padding:20px;height:450px;position:relative}

.svg-chart{width:100%;height:100%}
.chart-tooltip{position:absolute;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 12px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:10}
.chart-tooltip.show{opacity:1}
.chart-tooltip .tt-name{color:#f5f5f5;font-weight:500}
.chart-tooltip .tt-val{color:#a0a0a0;margin-top:2px}

.features{max-width:1440px;margin:0 auto;padding:0 24px 48px}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.feature-card{border-radius:10px;padding:24px;background:#161616;border:1px solid #222;transition:border-color .2s}
.feature-card:hover{border-color:#333}
.feature-icon{width:40px;height:40px;border-radius:8px;background:rgba(0,112,160,.1);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.feature-icon svg{width:20px;height:20px;color:#0070a0}
.feature-card h3{font-size:14px;font-weight:600;color:#f5f5f5;margin-bottom:8px}
.feature-card p{font-size:13px;color:#888;line-height:1.7}

.footer{border-top:1px solid #1a1a1a;background:#0c0c0c}
.footer-inner{max-width:1440px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.footer-brand{display:flex;align-items:center;gap:8px}
.footer-brand .logo-sm{width:24px;height:24px;border-radius:5px;background:linear-gradient(135deg,#0070a0,#1b9cca);display:flex;align-items:center;justify-content:center}
.footer-brand .logo-sm svg{width:14px;height:14px;color:#fff}
.footer-brand span{font-size:12px;color:#555;font-weight:500}
.footer-copy{font-size:12px;color:#333}

#importFile{display:none}

@media(max-width:1024px){
  .main-grid{flex-direction:column}
  .data-panel{width:100%}
  .features-grid{grid-template-columns:1fr}
}
@media(max-width:640px){
  .hero h1{font-size:28px}
  .stats-inner{gap:20px}
  .chart-area{height:320px}
}
</style>
</head>

<nav class="nav" id="nav">
  <div class="nav-inner">
    <div class="nav-brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
      </div>
      <span>DataViz</span>
    </div>

      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()">

</nav>

<input type="file" id="importFile" accept=".csv,.txt" onchange="handleImport(event)">

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-inner">
    <h1>填写数据，实时生成柱状图<br><span class="gradient">一键导出 PPT</span></h1>
    <p>让数据可视化变得简单高效。</p>
  </div>
</section>

<section class="stats-bar">
  <div class="stats-inner">
    <div class="stat-item"><span class="stat-label">数据项</span><span class="stat-value" id="statCount">5</span></div>
    <div class="stat-item"><span class="stat-label">最大值</span><span class="stat-value" id="statMax">280</span></div>
    <div class="stat-item"><span class="stat-label">平均值</span><span class="stat-value" id="statAvg">188</span></div>
    <div class="stat-item"><span class="stat-label">总计</span><span class="stat-value" id="statTotal">940</span></div>
  </div>
</section>

<section class="main">
  <div class="main-grid">

    <div class="panel data-panel" id="dataPanel">
      <div class="panel-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          数据输入

        <button class="btn btn-ghost btn-icon" onclick="addRow()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="col-headers"><span>时间</span><span>名称</span><span>数值</span><span></span><span></span></div>
      <div class="data-rows" id="dataRows"></div>
      <div class="panel-footer">
        <button class="btn btn-ghost btn-xs" onclick="addRow()" style="color:#0070a0">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加数据行
        </button>
        <span class="count">共 <span id="rowCount">5</span> 行</span>
      </div>
    </div>

    <div class="panel chart-panel" style="flex:1;min-width:0">

        <div class="chart-header-left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/></svg>
          <input type="text" id="chartTitle" value="数据图表报告" oninput="renderChart()">
        </div>
        <div class="chart-header-right">
          <button class="btn btn-primary btn-sm" onclick="exportPPTX()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

  <div class="features-grid">
    <div class="feature-card">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <h3>简单输入</h3>
      <p>像编辑表格一样输入数据，实时预览柱状图效果</p>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
      </div>

      <p>基于 SVG 的高性能图表，支持多彩配色与平滑动画</p>
    </div>
    <div class="feature-card">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>

  <div class="footer-inner">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
      </div>
      <span>DataViz Studio</span>
    </div>
    <span class="footer-copy">数据可视化图表生成器</span>

<script>
// ===================== STATE =====================
const COLORS = ['#0070a0','#2c90c9','#1b9cca','#66c7a0','#faea73','#e07a5f','#81b29a','#f2cc8f'];
const CHART_COLORS_PPTX = ['0070A0','2C90C9','1B9CCA','66C7A0','FAEA73','E07A5F','81B29A','F2CC8F'];

let rows = [
  {id:1,time:'2024-01',name:'产品A',value:120},
  {id:2,time:'2024-02',name:'产品B',value:200},
  {id:3,time:'2024-03',name:'产品C',value:150},
  {id:4,time:'2024-04',name:'产品D',value:280},
  {id:5,time:'2024-05',name:'产品E',value:190}
];
let nextId = 6;

// PPTX slide dimensions (16:9) in inches
const SLIDE_W = 10;      // 10 inches
const SLIDE_H = 5.625;   // 5.625 inches (16:9)
const MARGIN = 0.5;      // 0.5 inch margin on each side
const CONTENT_W = SLIDE_W - MARGIN * 2;  // 9 inches content width

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded',()=>{
  renderDataRows();
  renderChart();
  window.addEventListener('scroll',()=>{
    document.getElementById('nav').classList.toggle('scrolled',window.scrollY>50);
  });
});

// ===================== DATA ROWS =====================
function renderDataRows(){
  const container=document.getElementById('dataRows');
  container.innerHTML='';
  rows.forEach((row,i)=>{
    const el=document.createElement('div');
    el.className='data-row';
    el.innerHTML=`
      <input type="text" value="${eH(row.time)}" oninput="updateRow(${row.id},'time',this.value)" placeholder="时间">
      <input type="text" value="${eH(row.name)}" oninput="updateRow(${row.id},'name',this.value)" placeholder="名称">
      <input type="number" value="${row.value}" oninput="updateRow(${row.id},'value',this.value)" placeholder="0">
      <div class="row-arrows">
        <button onclick="moveRow(${i},-1)" ${i===0?'disabled':''}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg></button>
        <button onclick="moveRow(${i},1)" ${i===rows.length-1?'disabled':''}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>
      </div>
      <button class="row-del" onclick="removeRow(${row.id})" ${rows.length<=1?'disabled':''} title="删除"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    `;
    container.appendChild(el);
  });
  updateStats();
}

function addRow(){
  rows.push({id:nextId++,time:'',name:'项目'+(rows.length+1),value:0});
  renderDataRows();
  renderChart();
}

function removeRow(id){
  if(rows.length<=1)return;
  rows=rows.filter(r=>r.id!==id);
  renderDataRows();
  renderChart();
}

function updateRow(id,field,val){
  const row=rows.find(r=>r.id===id);
  if(!row)return;
  if(field==='value'){
    const n=parseFloat(val);
    row.value=isNaN(n)?0:n;
  }else{
    row[field]=val;
  }
  updateStats();
  renderChart();
}

function moveRow(idx,dir){
  const ni=idx+dir;
  if(ni<0||ni>=rows.length)return;
  [rows[idx],rows[ni]]=[rows[ni],rows[idx]];
  renderDataRows();
  renderChart();
}

function updateStats(){
  const count=rows.length;
  const total=rows.reduce((s,r)=>s+r.value,0);
  const max=Math.max(...rows.map(r=>r.value),0);
  const avg=count>0?Math.round(total/count):0;
  document.getElementById('statCount').textContent=count;
  document.getElementById('statMax').textContent=max.toLocaleString();
  document.getElementById('statAvg').textContent=avg.toLocaleString();
  document.getElementById('statTotal').textContent=total.toLocaleString();
  document.getElementById('rowCount').textContent=count;
}

// ===================== SVG CHART =====================
function renderChart(){
  const svg=document.getElementById('chartSvg');
  if(rows.length===0){svg.innerHTML='';return;}
  const rect=svg.getBoundingClientRect();
  const W=rect.width||800, H=rect.height||400;
  const PAD={top:30,right:20,bottom:50,left:60};
  const w=W-PAD.left-PAD.right, h=H-PAD.top-PAD.bottom;
  const maxVal=Math.max(...rows.map(r=>r.value),0);
  const yMax=maxVal===0?10:Math.ceil(maxVal*1.15/10)*10;
  const barW=Math.min(w/rows.length*0.6,56);
  const gap=(w-barW*rows.length)/(rows.length+1);
  let html='';
  const gc=5;
  for(let i=0;i<=gc;i++){
    const y=PAD.top+h-(i/gc)*h, val=Math.round((i/gc)*yMax);
    html+=`<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#222" stroke-dasharray="3 6"/>`;
    html+=`<text x="${PAD.left-10}" y="${y+4}" text-anchor="end" fill="#666" font-size="11" font-family="Roboto Mono,Noto Sans SC,monospace">${val.toLocaleString()}</text>`;
  }
  rows.forEach((row,i)=>{
    const x=PAD.left+gap+i*(barW+gap);
    const bh=(row.value/yMax)*h, y=PAD.top+h-bh;
    const c=COLORS[i%COLORS.length];
    const label=row.time?row.time+' '+row.name:row.name;
    html+=`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="4" fill="${c}" opacity="0.85" style="cursor:pointer" onmouseenter="showTT(event,'${eH(label)}',${row.value})" onmousemove="moveTT(event)" onmouseleave="hideTT()"/>`;
    html+=`<text x="${x+barW/2}" y="${y-8}" text-anchor="middle" fill="#a0a0a0" font-size="11" font-family="Roboto Mono,Noto Sans SC,monospace">${row.value.toLocaleString()}</text>`;
    // X-axis shows time + name (two lines)
    const xLabel=row.time?(row.time+'|'+row.name):row.name;
    const xLines=xLabel.split('|');
    xLines.forEach((line,li)=>{
      html+=`<text x="${x+barW/2}" y="${PAD.top+h+18+li*16}" text-anchor="middle" fill="#888" font-size="12">${eH(line)}</text>`;
    });
  });
  html+=`<line x1="${PAD.left}" y1="${PAD.top+h}" x2="${W-PAD.right}" y2="${PAD.top+h}" stroke="#333"/>`;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=html;
}

function showTT(e,name,val){
  document.getElementById('ttName').textContent=name;
  document.getElementById('ttVal').textContent='数值: '+val.toLocaleString();
  document.getElementById('tooltip').classList.add('show');
  moveTT(e);
}
function moveTT(e){
  const r=document.getElementById('chartArea').getBoundingClientRect();
  const t=document.getElementById('tooltip');
  t.style.left=(e.clientX-r.left+12)+'px';
  t.style.top=(e.clientY-r.top-40)+'px';
}
function hideTT(){document.getElementById('tooltip').classList.remove('show');}

new ResizeObserver(()=>renderChart()).observe(document.getElementById('chartArea'));

// ===================== IMPORT =====================
function handleImport(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const lines=ev.target.result.split('\n');
    const newRows=[];
    lines.forEach(line=>{
      const t=line.trim();
      if(!t||t.startsWith('#'))return;
      const parts=t.split(/[,\t]/);
      if(parts.length>=3){
        const time=parts[0].trim();
        const name=parts[1].trim();
        const val=parseFloat(parts[2].trim());
        if(time&&name&&!isNaN(val))newRows.push({id:nextId++,time,name,value:val});
      }else if(parts.length===2){
        const name=parts[0].trim();
        const val=parseFloat(parts[1].trim());
        if(name&&!isNaN(val))newRows.push({id:nextId++,time:'',name,value:val});
      }
    });
    if(newRows.length>0){rows=newRows;renderDataRows();renderChart();}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ===================== EXPORT PPTX =====================
function exportPPTX(){
  const title=document.getElementById('chartTitle').value||'数据图表报告';
  const pptx=new PptxGenJS();
  pptx.layout='LAYOUT_16x9';
  pptx.author='DataViz';
  pptx.company='DataViz Studio';
  pptx.subject=title;
  pptx.title=title;

  // Define master slide with proper black background
  pptx.defineSlideMaster({
    title:'DARK_MASTER',
    background:{color:'101010'},
    objects:[]
  });

  const today=new Date().toLocaleDateString('zh-CN');

  // ===== 封面页 =====
  const s1=pptx.addSlide({masterName:'DARK_MASTER'});
  // Full slide black background (exact inches)
  s1.addShape(pptx.shapes.RECTANGLE,{
    x:0, y:0, w:SLIDE_W, h:SLIDE_H,
    fill:{color:'101010'}
  });
  // Title
  s1.addText(title,{
    x:MARGIN, y:2.8, w:CONTENT_W, h:0.8,
    fontSize:36, color:'F5F5F5', fontFace:'Microsoft YaHei',
    align:'center', bold:true
  });
  // Subtitle
  s1.addText('自动生成 · 可视化分析 · 一键导出',{
    x:MARGIN, y:3.7, w:CONTENT_W, h:0.4,
    fontSize:14, color:'A0A0A0', fontFace:'Microsoft YaHei',
    align:'center'
  });
  // Date
  s1.addText(today,{
    x:MARGIN, y:4.5, w:CONTENT_W, h:0.3,
    fontSize:11, color:'888888', fontFace:'Roboto Mono',
    align:'center'
  });

  // ===== 图表页 (X轴=时间, Y轴=数值) =====
  const s2=pptx.addSlide({masterName:'DARK_MASTER'});
  // Full slide black background
  s2.addShape(pptx.shapes.RECTANGLE,{
    x:0, y:0, w:SLIDE_W, h:SLIDE_H,
    fill:{color:'101010'}
  });
  // Title
  s2.addText(title,{
    x:MARGIN, y:0.2, w:CONTENT_W, h:0.4,
    fontSize:16, color:'F5F5F5', fontFace:'Microsoft YaHei', bold:true
  });
  // Top divider
  s2.addShape(pptx.shapes.RECTANGLE,{
    x:MARGIN, y:0.62, w:CONTENT_W, h:0.01,
    fill:{color:'333333'}
  });

  // Chart: X-axis = time + name (two-line label), each bar = different color
  const timeLabels=rows.map(r=>{
    if(r.time&&r.name)return r.time+'\n'+r.name;
    return r.time||r.name;
  });
  const chartValues=rows.map(r=>r.value);
  const barColors=rows.map((_,i)=>CHART_COLORS_PPTX[i%CHART_COLORS_PPTX.length]);

  // Adjust font size based on data count
  const labelFontSize=rows.length>12?8:rows.length>8?10:11;

  s2.addChart(pptx.charts.BAR,[{
    name:'数值',
    labels:timeLabels,
    values:chartValues
  }],{
    x:MARGIN, y:0.75, w:CONTENT_W, h:4.7,
    barDir:'col',
    barGrouping:'clustered',
    chartColors:barColors,
    showValue:true,
    dataLabelColor:'F5F5F5',
    dataLabelFontSize:10,
    dataLabelPosition:'outEnd',
    showLegend:false,
    catAxisLabelColor:'A0A0A0',
    catAxisLabelFontSize:labelFontSize,
    catAxisLineColor:'333333',
    catAxisLabelRotate:rows.length>10?45:0,
    valAxisLabelColor:'888888',
    valAxisLabelFontSize:11,
    valAxisLineColor:'101010',
    valGridLine:{color:'222222',style:'dash'},
    valAxisMaxVal:null,
    chartArea:{fill:{color:'101010'}},
    plotArea:{fill:{color:'101010'}},
    showTitle:false
  });

  // Bottom divider
  s2.addShape(pptx.shapes.RECTANGLE,{
    x:MARGIN, y:5.55, w:CONTENT_W, h:0.01,
    fill:{color:'333333'}
  });
  s2.addText('02 / 03',{
    x:MARGIN+CONTENT_W-1.3, y:5.58, w:1.3, h:0.22,
    fontSize:9, color:'555555', fontFace:'Roboto Mono', align:'right'
  });

  // ===== 数据表页 (3列: 时间 名称 数值) =====
  const s3=pptx.addSlide({masterName:'DARK_MASTER'});
  // Full slide black background
  s3.addShape(pptx.shapes.RECTANGLE,{
    x:0, y:0, w:SLIDE_W, h:SLIDE_H,
    fill:{color:'101010'}
  });
  s3.addText('源数据明细',{
    x:MARGIN, y:0.2, w:CONTENT_W, h:0.4,
    fontSize:16, color:'F5F5F5', fontFace:'Microsoft YaHei', bold:true
  });
  s3.addShape(pptx.shapes.RECTANGLE,{
    x:MARGIN, y:0.62, w:CONTENT_W, h:0.01,
    fill:{color:'333333'}
  });

  // Build 3-column table
  const tableData=[['时间','名称','数值']];
  rows.forEach(r=>tableData.push([r.time,r.name,String(r.value)]));

  // Dynamic row height based on data count
  const maxTableH=4.6;
  const rowH=Math.min(0.45, maxTableH/(rows.length+1));

  s3.addTable(tableData,{
    x:MARGIN, y:0.75, w:CONTENT_W, h:maxTableH,
    fontFace:'Microsoft YaHei',
    fontSize:13,
    color:'F5F5F5',
    border:{type:'solid',pt:0.5,color:'333333'},
    colW:[CONTENT_W/3,CONTENT_W/3,CONTENT_W/3],
    fill:{color:'1A1A1A'},
    fillAltRows:{color:'222222'},
    headerFill:{color:'0070A0'},
    headerColor:'FFFFFF',
    headerFontSize:13,
    headerBold:true,
    headerBorder:{type:'solid',pt:0.5,color:'0070A0'},
    align:'center',
    valign:'middle',
    rowH:rowH
  });

  // Bottom divider
  s3.addShape(pptx.shapes.RECTANGLE,{
    x:MARGIN, y:5.55, w:CONTENT_W, h:0.01,
    fill:{color:'333333'}
  });
  s3.addText('03 / 03',{
    x:MARGIN+CONTENT_W-1.3, y:5.58, w:1.3, h:0.22,
    fontSize:9, color:'555555', fontFace:'Roboto Mono', align:'right'
  });

  // Save
  pptx.writeFile({fileName:title+'.pptx'});
}

function eH(str){const d=document.createElement('div');d.textContent=String(str||'');return d.innerHTML;}
